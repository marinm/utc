<!DOCTYPE html>
<html>
    <head>
        <title>UTC Clock</title>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <style>
            body {
                background-color: black;
            }

            #clock {
                display: block;
                width: 100%;
                max-width: 500px;
                margin: 20px auto 0 auto;
            }
        </style>
    </head>
    <body>
        <canvas id="clock"></canvas>

        <script>

            // ==========
            // :)
            
            const REDRAW_INTERVAL_MS = 20;

            const CLOCK_RADIUS                  = 250;
            const CLOCK_WIDTH                   = (CLOCK_RADIUS * 2) + 10;
            const CLOCK_HEIGHT                  = CLOCK_WIDTH;

            const CLOCK_CENTER_X                = CLOCK_WIDTH / 2.0;
            const CLOCK_CENTER_Y                = CLOCK_HEIGHT / 2.0;

            const SECOND_ARM_THICKNESS          = 4.00;
            const SECOND_ARM_LENGTH             = 1.00;
            const SECOND_ARM_COLOR              = 'orange';
            const SECOND_ARM_FIXTURE_RADIUS     = 0.02;
            const SECOND_ARM_TAIL_LENGTH        = 0.20;
            
            const QUARTER_SECOND_TICK_LENGTH    = 0.04;
            const QUARTER_SECOND_TICK_THICKNESS = 3.50;
            const QUARTER_SECOND_TICK_COLOR     = '#555555';

            const SECOND_TICK_LENGTH            = 0.08;
            const SECOND_TICK_THICKNESS         = 3.50;
            const SECOND_TICK_COLOR             = '#555555';

            const FIVE_SECOND_TICK_LENGTH       = 0.08;
            const FIVE_SECOND_TICK_THICKNESS    = 3.50;
            const FIVE_SECOND_TICK_COLOR        = '#ffffff';

            const DATETIME_TICKER_BASELINE      = CLOCK_HEIGHT * 0.66;
            const DATETIME_TICKER_LEFT          = CLOCK_WIDTH * 0.50;
            const DATETIME_TICKER_FONT          = '22px sans-serif';
            const DATETIME_TICKER_COLOR         = '#cccccc';

            // ==========

            const clock = document.querySelector("#clock");
            clock.width = CLOCK_WIDTH;
            clock.height = CLOCK_HEIGHT;

            const clock2d = clock.getContext('2d');


            // Start the program...
            const timer = setInterval(draw_clock, REDRAW_INTERVAL_MS);

            // ==========

            function draw_clock() {
                const time = utc_now();
                const ss = time.getUTCSeconds();
                const ms = time.getUTCMilliseconds();
                
                // Redraw the clock on every tick
                clear();
                draw_ticks(0.25 * 1000, QUARTER_SECOND_TICK_LENGTH, QUARTER_SECOND_TICK_COLOR, QUARTER_SECOND_TICK_THICKNESS);
                draw_ticks(1.00 * 1000, SECOND_TICK_LENGTH,         SECOND_TICK_COLOR,         SECOND_TICK_THICKNESS);
                draw_ticks(5.00 * 1000, FIVE_SECOND_TICK_LENGTH,    FIVE_SECOND_TICK_COLOR,    FIVE_SECOND_TICK_THICKNESS);
                draw_formatted_time(utc_time_formatted(time), DATETIME_TICKER_COLOR);
                draw_second_arm((ss * 1000) + ms);
            }

            function clear() {
                clock2d.clearRect(0, 0, CLOCK_WIDTH, CLOCK_HEIGHT);
            }

            function draw_formatted_time(str, color) {
                clock2d.font = DATETIME_TICKER_FONT;
                clock2d.fillStyle = DATETIME_TICKER_COLOR;
                clock2d.textAlign = 'left';
                clock2d.textBaseline = 'bottom';

                const align_time = utc_time_formatted(new Date(0));
                const align_time_measure = clock2d.measureText(align_time);
                const left = CLOCK_CENTER_X - (0.5 * align_time_measure.width);
                const baseline = DATETIME_TICKER_BASELINE;

                clock2d.fillText(str, left, baseline);               
            }

            function draw_second_arm(ms) {

                // 'from' pixels from the center

                const arm_angle = ms_to_angle(ms);

                clock2d.lineWidth = SECOND_ARM_THICKNESS;
                clock2d.strokeStyle = SECOND_ARM_COLOR;

                // Draw the hand fixture
                draw_circle(clock2d, CLOCK_CENTER_X, CLOCK_CENTER_Y, SECOND_ARM_FIXTURE_RADIUS, CLOCK_RADIUS);

                // Draw the main part of the arm
                draw_radius(clock2d, CLOCK_CENTER_X, CLOCK_CENTER_Y, CLOCK_RADIUS, arm_angle, SECOND_ARM_FIXTURE_RADIUS, SECOND_ARM_LENGTH);

                // Draw the tail
                draw_radius(clock2d, CLOCK_CENTER_X, CLOCK_CENTER_Y, CLOCK_RADIUS, arm_angle + Math.PI, SECOND_ARM_FIXTURE_RADIUS, SECOND_ARM_TAIL_LENGTH);
            }

            function utc_now() {
                return new Date(Date.now());
            }

            function utc_time_formatted(utc_time) {
                const YYYY = String( utc_time.getUTCFullYear()     );
                const MM   = String( utc_time.getUTCMonth() + 1    ).padStart(2, '0');
                const DD   = String( utc_time.getUTCDate()         ).padStart(2, '0');
                const hh   = String( utc_time.getUTCHours()        ).padStart(2, '0');
                const mm   = String( utc_time.getUTCMinutes()      ).padStart(2, '0');
                const ss   = String( utc_time.getUTCSeconds()      ).padStart(2, '0');
                const ms   = String( utc_time.getUTCMilliseconds() ).substring(0, 2).padStart(2, '0');

                return `${YYYY}-${MM}-${DD} ${hh}:${mm}:${ss}.${ms}`;
            }

            // Given arm position in milliseconds (full clock face has 60 * 1000 ms)
            // Return arm angle in radians (relative to x axis)
            function ms_to_angle(ms) {
                const FULL_CIRCLE = 2.0 * Math.PI;
                const QUARTER_CIRCLE = FULL_CIRCLE / 4.0;
                return ((ms / (60.0 * 1000.0)) * FULL_CIRCLE) - QUARTER_CIRCLE;
            }

            function draw_ticks(ms_increment, length, color, thickness) {
                let ms = 0;
                while (ms < (60 * 1000)) {
                    draw_tick(ms, length, color, thickness);
                    ms += ms_increment;
                }
            }

            function draw_tick(ms, length, color, thickness) {
                // length is relative to clock radius, 0...1

                const arm_angle = ms_to_angle(ms);

                clock2d.lineWidth = thickness;
                clock2d.strokeStyle = color;

                draw_radius(clock2d, CLOCK_CENTER_X, CLOCK_CENTER_Y, CLOCK_RADIUS, arm_angle, 1.0 - length, 1.0);
            }

            // ==========
            // Generic shapes

            function draw_radius(ctx, x, y, scale, angle, inner_radius, outer_radius) {

                const inner_x = x + (Math.cos(angle) * inner_radius * scale);
                const inner_y = y + (Math.sin(angle) * inner_radius * scale);

                const outer_x = x + (Math.cos(angle) * outer_radius * scale);
                const outer_y = y + (Math.sin(angle) * outer_radius * scale);

                ctx.beginPath();
                ctx.moveTo(inner_x, inner_y);
                ctx.lineTo(outer_x, outer_y);
                ctx.stroke();
            }

            function draw_circle(ctx, x, y, radius, scale) {
                ctx.beginPath();
                ctx.arc(x, y, radius * scale, 0, 2 * Math.PI);
                ctx.stroke();
            }
        </script>
    </body>
</html>
