<!DOCTYPE html>
<html>
    <head>
        <title>UTC Clock</title>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <style>
            body {
                background-color: black;
            }

            #clock {
                display: block;
                width: 100%;
                max-width: 500px;
                margin: 20px auto 0 auto;
            }
        </style>
    </head>
    <body>
        <canvas id="clock"></canvas>

        <script>

            // ==========
            // :)
            
            const REDRAW_INTERVAL_MS = 20;

            const CLOCK_RADIUS                  = 250;
            const CLOCK_WIDTH                   = (CLOCK_RADIUS * 2) + 10;
            const CLOCK_HEIGHT                  = CLOCK_WIDTH;

            const CLOCK_CENTER_X                = CLOCK_WIDTH / 2.0;
            const CLOCK_CENTER_Y                = CLOCK_HEIGHT / 2.0;

            const SECOND_ARM_THICKNESS          = 2.00;
            const SECOND_ARM_LENGTH             = 1.00;
            const SECOND_ARM_COLOR              = 'orange';
            const SECOND_ARM_FIXTURE_RADIUS     = 0.02;
            const SECOND_ARM_TAIL_LENGTH        = 0.20;

            const HOUR_ARM_THICKNESS            = 2.00;
            const HOUR_ARM_LENGTH               = 0.92;
            const HOUR_ARM_COLOR                = '#dddddd';
            const HOUR_ARM_FIXTURE_RADIUS       = 0.02;
            const HOUR_ARM_TAIL_LENGTH          = 0.10;
            
            const QUARTER_SECOND_TICK_LENGTH    = 0.04;
            const QUARTER_SECOND_TICK_THICKNESS = 3.50;
            const QUARTER_SECOND_TICK_COLOR     = '#555555';

            const HOUR_TICK_LENGTH              = 0.08;
            const HOUR_TICK_THICKNESS           = 3.50;
            const HOUR_TICK_COLOR               = '#ffffff';

            const HOUR_LABEL_FONT               = '12px Courier New';
            const HOUR_LABEL_COLOR              = '#ffffff';
            const HOUR_LABEL_RADIUS             = 0.85;

            const HALF_HOUR_TICK_LENGTH         = 0.08;
            const HALF_HOUR_TICK_THICKNESS      = 2.50;
            const HALF_HOUR_TICK_COLOR          = '#555555';

            const TEN_MINUTE_TICK_LENGTH         = 0.04;
            const TEN_MINUTE_TICK_THICKNESS      = 2.5;
            const TEN_MINUTE_TICK_COLOR          = '#555555';

            const FIVE_MINUTE_TICK_LENGTH         = 0.04;
            const FIVE_MINUTE_TICK_THICKNESS      = 1.50;
            const FIVE_MINUTE_TICK_COLOR          = '#555555';

            const SECOND_TICK_LENGTH            = 0.08;
            const SECOND_TICK_THICKNESS         = 3.50;
            const SECOND_TICK_COLOR             = '#555555';

            const FIVE_SECOND_TICK_LENGTH       = 0.08;
            const FIVE_SECOND_TICK_THICKNESS    = 3.50;
            const FIVE_SECOND_TICK_COLOR        = '#ffffff';

            const FIVE_SECOND_LABEL_FONT        = '40px Courier New';
            const FIVE_SECOND_LABEL_COLOR       = '#ffffff';
            const FIVE_SECOND_LABEL_RADIUS      = 0.80;

            const DATETIME_TICKER_BASELINE      = CLOCK_HEIGHT * 0.66;
            const DATETIME_TICKER_LEFT          = CLOCK_WIDTH * 0.50;
            const DATETIME_TICKER_FONT          = '18px Courier New';
            const DATETIME_TICKER_COLOR         = '#cccccc';

            const TIMESTAMP_TICKER_BASELINE     = CLOCK_HEIGHT * 0.66;
            const TIMESTAMP_TICKER_LEFT         = CLOCK_WIDTH * 0.50;
            const TIMESTAMP_TICKER_FONT         = '18px Courier New';
            const TIMESTAMP_TICKER_COLOR        = '#cccccc';

            // ==========

            const clock = document.querySelector("#clock");
            clock.width = CLOCK_WIDTH;
            clock.height = CLOCK_HEIGHT;

            const clock2d = clock.getContext('2d');


            // Start the program...
            const timer = setInterval(draw_clock, REDRAW_INTERVAL_MS);

            // ==========

            function draw_clock() {
                const time = utc_now();

                const hh = 1.0 * time.getUTCHours();
                const mm = 1.0 * time.getUTCMinutes();
                const ss = 1.0 * time.getUTCSeconds();
                const ms = 1.0 * time.getUTCMilliseconds();

                // Redraw the clock on every tick
                clear();

                // 5-minute ticks
                //draw_ticks(0, 24 * 12, FIVE_MINUTE_TICK_LENGTH, FIVE_MINUTE_TICK_COLOR, FIVE_MINUTE_TICK_THICKNESS);

                const ms_turn_angle = clock_turns_to_radians((ss * 1000) + ms) / (60 * 1000);

                // 10-minute ticks
                draw_ticks(ms_turn_angle, 24 * 6, TEN_MINUTE_TICK_LENGTH, TEN_MINUTE_TICK_COLOR, TEN_MINUTE_TICK_THICKNESS);

                // 30-minute ticks
                draw_ticks(ms_turn_angle, 24 * 2, HALF_HOUR_TICK_LENGTH, HALF_HOUR_TICK_COLOR, HALF_HOUR_TICK_THICKNESS);

                // 1-hour ticks
                draw_ticks(ms_turn_angle, 24, HOUR_TICK_LENGTH, HOUR_TICK_COLOR, HOUR_TICK_THICKNESS);

                draw_datetime(utc_time_formatted(time), DATETIME_TICKER_COLOR);

                draw_timestamp(Number(time));

                draw_hour_labels(ms_turn_angle);

                //draw_hour_arm((hh * 60 * 60 * 1000) + (mm * 60 * 1000) + (ss * 1000) + (ms), 24 * 60 * 60 * 1000);

                draw_second_arm((ss * 1000) + ms, 60 * 1000);
            }

            function clear() {
                clock2d.clearRect(0, 0, CLOCK_WIDTH, CLOCK_HEIGHT);
            }

            function draw_datetime(str, color) {
                clock2d.font = DATETIME_TICKER_FONT;
                clock2d.fillStyle = DATETIME_TICKER_COLOR;
                clock2d.textAlign = 'right';
                clock2d.textBaseline = 'bottom';

                const align_time = utc_time_formatted(new Date(0));
                const align_time_measure = clock2d.measureText(align_time);
                const right = CLOCK_CENTER_X + (0.5 * align_time_measure.width);
                const baseline = DATETIME_TICKER_BASELINE;

                clock2d.fillText(str, right, baseline);
            }

            function draw_timestamp(str, color) {
                clock2d.font = TIMESTAMP_TICKER_FONT;
                clock2d.fillStyle = TIMESTAMP_TICKER_COLOR;
                clock2d.textAlign = 'right';
                clock2d.textBaseline = 'bottom';

                const align_time = utc_time_formatted(new Date(0));
                const align_time_measure = clock2d.measureText(align_time);
                const right = CLOCK_CENTER_X + (0.5 * align_time_measure.width);
                const baseline = TIMESTAMP_TICKER_BASELINE;

                clock2d.fillText(str, right, baseline + 30);
            }

            function draw_second_arm(position, interval) {

                // 'from' pixels from the center

                position = 0;

                const arm_angle = clock_turns_to_radians((position * 1.0) / interval); //ms_to_angle(ms);

                clock2d.lineWidth = SECOND_ARM_THICKNESS;
                clock2d.strokeStyle = SECOND_ARM_COLOR;

                // Draw the hand fixture
                draw_circle(clock2d, CLOCK_CENTER_X, CLOCK_CENTER_Y, SECOND_ARM_FIXTURE_RADIUS, CLOCK_RADIUS);

                // Draw the main part of the arm
                draw_radius(clock2d, CLOCK_CENTER_X, CLOCK_CENTER_Y, CLOCK_RADIUS, arm_angle, SECOND_ARM_FIXTURE_RADIUS, SECOND_ARM_LENGTH);

                // Draw the tail
                draw_radius(clock2d, CLOCK_CENTER_X, CLOCK_CENTER_Y, CLOCK_RADIUS, arm_angle + Math.PI, SECOND_ARM_FIXTURE_RADIUS, SECOND_ARM_TAIL_LENGTH);
            }

            function draw_hour_arm(position, interval) {

                const arm_angle = clock_turns_to_radians((position * 1.0) / interval);

                clock2d.lineWidth = HOUR_ARM_THICKNESS;
                clock2d.strokeStyle = HOUR_ARM_COLOR;

                // Draw the hand fixture
                draw_circle(clock2d, CLOCK_CENTER_X, CLOCK_CENTER_Y, HOUR_ARM_FIXTURE_RADIUS, CLOCK_RADIUS);

                // Draw the main part of the arm
                draw_radius(clock2d, CLOCK_CENTER_X, CLOCK_CENTER_Y, CLOCK_RADIUS, arm_angle, HOUR_ARM_FIXTURE_RADIUS, HOUR_ARM_LENGTH);

                // Draw the tail
                draw_radius(clock2d, CLOCK_CENTER_X, CLOCK_CENTER_Y, CLOCK_RADIUS, arm_angle + Math.PI, HOUR_ARM_FIXTURE_RADIUS, HOUR_ARM_TAIL_LENGTH);
            }

            function utc_now() {
                return new Date(Date.now());
            }

            function utc_time_formatted(utc_time) {
                const YYYY = String( utc_time.getUTCFullYear()     );
                const MM   = String( utc_time.getUTCMonth() + 1    ).padStart(2, '0');
                const DD   = String( utc_time.getUTCDate()         ).padStart(2, '0');
                const hh   = String( utc_time.getUTCHours()        ).padStart(2, '0');
                const mm   = String( utc_time.getUTCMinutes()      ).padStart(2, '0');
                const ss   = String( utc_time.getUTCSeconds()      ).padStart(2, '0');
                const ms   = String( utc_time.getUTCMilliseconds() ).padStart(3, '0');

                return `${YYYY}-${MM}-${DD} ${hh}:${mm}:${ss}.${ms}`;
            }

            function clock_turns_to_radians(turn) {
                // turn=0.5 means a half-turn from the top
                // like a clock with the zero at the top
                const FULL_CIRCLE = 2.0 * Math.PI;
                const QUARTER_CIRCLE = FULL_CIRCLE / 4.0;
                return (turn * FULL_CIRCLE) - QUARTER_CIRCLE;
            }

            // Given arm position in milliseconds (full clock face has 60 * 1000 ms)
            // Return arm angle in radians (relative to x axis)
            function ms_to_angle(ms) {
                return clock_turns_to_radians(ms / (60.0 * 1000.0));
            }

            function draw_ticks(start, n, length, color, thickness) {
                // draw n ticks evenly spaced out around the perimeter of the clock
                //
                // n : number of ticks to draw
                // length : tick length in pixels
                // color : tick color
                // thickness : tick thickness
                // start : angle in radians

                clock2d.lineWidth = thickness;
                clock2d.strokeStyle = color;

                const interval = 2.0 * Math.PI / n;

                for (let i = 0; i < n; i++) {
                    const angle = start + (i * interval);
                    draw_radius(clock2d, CLOCK_CENTER_X, CLOCK_CENTER_Y, CLOCK_RADIUS, angle, 1.0 - length, 1.0);
                }
            }

            function draw_clock_number_sequence(ctx, start, d, n, x, y, radius, scale, offset) {
                for (let i = 0; i < n; i++) {
                    const number = start + (i * d);
                    const turn = offset + clock_turns_to_radians((i * 1.0) / n);
                    draw_text_in_circle(ctx, String(number), x, y, radius, scale, turn);
                }
            }

            function draw_hour_labels(offset) {
                clock2d.fillStyle = HOUR_LABEL_COLOR;
                clock2d.font = HOUR_LABEL_FONT;

                draw_clock_number_sequence(clock2d, 0, 1, 24, CLOCK_CENTER_X, CLOCK_CENTER_Y, HOUR_LABEL_RADIUS, CLOCK_RADIUS, offset);
            }

            // ==========
            // Generic shapes

            function draw_radius(ctx, x, y, scale, angle, inner_radius, outer_radius) {

                const inner_x = x + (Math.cos(angle) * inner_radius * scale);
                const inner_y = y + (Math.sin(angle) * inner_radius * scale);

                const outer_x = x + (Math.cos(angle) * outer_radius * scale);
                const outer_y = y + (Math.sin(angle) * outer_radius * scale);

                ctx.beginPath();
                ctx.moveTo(inner_x, inner_y);
                ctx.lineTo(outer_x, outer_y);
                ctx.stroke();
            }

            function draw_circle(ctx, x, y, radius, scale) {
                ctx.beginPath();
                ctx.arc(x, y, radius * scale, 0, 2 * Math.PI);
                ctx.stroke();
            }

            function draw_text_in_circle(ctx, str, center_x, center_y, radius, scale, angle) {

                ctx.textBaseline = 'middle';
                ctx.textAlign = 'center';

                const x = center_x + (Math.cos(angle) * radius * scale);
                const y = center_y + (Math.sin(angle) * radius * scale);

                ctx.fillText(str, x, y);
            }
        </script>
    </body>
</html>
